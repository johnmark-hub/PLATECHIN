<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>EduTrack – Student</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0f1e;--surface:#111827;--card:#161f35;--border:#1e2d4a;--accent:#4f8ef7;--accent2:#7c5cfc;--text:#e8edf5;--muted:#6b7a99;--present:#10b981;--absent:#ef4444;--late:#f59e0b;--present-bg:rgba(16,185,129,0.1);--absent-bg:rgba(239,68,68,0.1);--late-bg:rgba(245,158,11,0.1);}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;max-width:430px;margin:0 auto;position:relative;overflow:hidden;display:flex;flex-direction:column;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(79,142,247,0.12) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(124,92,252,0.10) 0%,transparent 60%);pointer-events:none;z-index:0;}
    .topbar{position:sticky;top:0;z-index:100;background:rgba(10,15,30,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .topbar-left{display:flex;align-items:center;gap:10px;}
    .app-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;}
    .app-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:900;background:linear-gradient(90deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .logout-icon-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all 0.2s;}
    .logout-icon-btn:active{background:var(--absent-bg);color:var(--absent);border-color:var(--absent);}
    .scroll-content{position:relative;z-index:1;padding:20px 16px 24px;overflow-y:auto;flex:1;scrollbar-width:none;-ms-overflow-style:none;}
    .scroll-content::-webkit-scrollbar{display:none;}
    .profile-card{background:linear-gradient(135deg,rgba(79,142,247,0.15),rgba(124,92,252,0.15));border:1px solid rgba(79,142,247,0.25);border-radius:20px;padding:22px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;}
    .profile-card::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:radial-gradient(circle,rgba(79,142,247,0.15),transparent);border-radius:50%;}
    .profile-avatar{width:60px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 6px 20px rgba(79,142,247,0.35);}
    .profile-info .greeting{font-size:12px;color:var(--muted);margin-bottom:4px;}
    .profile-info .name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;line-height:1.2;}
    .profile-info .email{font-size:12px;color:var(--muted);margin-top:4px;}
    .student-badge{position:absolute;top:16px;right:16px;background:rgba(79,142,247,0.15);border:1px solid rgba(79,142,247,0.3);border-radius:100px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.8px;}
    .date-chip{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:20px;}
    .date-chip span{color:var(--text);}
    .section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px;}
    .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
    .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 12px;text-align:center;position:relative;overflow:hidden;transition:transform 0.15s;}
    .kpi-card:active{transform:scale(0.97);}
    .kpi-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;}
    .kpi-card.total::after{background:linear-gradient(90deg,var(--accent),var(--accent2));}
    .kpi-card.present::after{background:var(--present);}
    .kpi-card.absent::after{background:var(--absent);}
    .kpi-card.late::after{background:var(--late);}
    .kpi-icon{font-size:22px;margin-bottom:8px;}
    .kpi-val{font-size:32px;font-weight:700;line-height:1;}
    .kpi-card.total .kpi-val{color:var(--accent);}
    .kpi-card.present .kpi-val{color:var(--present);}
    .kpi-card.absent .kpi-val{color:var(--absent);}
    .kpi-card.late .kpi-val{color:var(--late);}
    .kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-top:6px;line-height:1.3;}
    .rate-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 20px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;}
    .rate-info .rate-label{font-size:12px;color:var(--muted);margin-bottom:6px;}
    .rate-info .rate-val{font-size:28px;font-weight:700;}
    .rate-ring{width:64px;height:64px;position:relative;}
    .rate-ring svg{transform:rotate(-90deg);}
    .rate-ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
    .history-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
    .history-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .history-header h3{font-size:14px;font-weight:700;}
    .history-count{font-size:11px;color:var(--muted);background:var(--surface);border-radius:100px;padding:3px 10px;}
    .history-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid rgba(30,45,74,0.4);gap:14px;transition:background 0.15s;}
    .history-row:last-child{border-bottom:none;}
    .history-row:active{background:rgba(79,142,247,0.04);}
    .history-date-box{background:var(--surface);border-radius:10px;padding:8px 10px;text-align:center;flex-shrink:0;min-width:46px;}
    .history-date-box .day-num{font-size:20px;font-weight:700;line-height:1;color:var(--text);}
    .history-date-box .month{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}
    .history-info{flex:1;}
    .history-info .weekday{font-size:13px;font-weight:600;}
    .history-info .year{font-size:11px;color:var(--muted);margin-top:2px;}
    .history-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
    .status-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
    .pill-p{background:var(--present-bg);color:var(--present);border:1px solid rgba(16,185,129,0.2);}
    .pill-a{background:var(--absent-bg);color:var(--absent);border:1px solid rgba(239,68,68,0.2);}
    .pill-l{background:var(--late-bg);color:var(--late);border:1px solid rgba(245,158,11,0.2);}
    .time-label{font-size:11px;color:var(--muted);}
    .empty-state{padding:48px 20px;text-align:center;color:var(--muted);}
    .empty-state .empty-icon{font-size:48px;margin-bottom:12px;opacity:0.5;}
    .empty-state p{font-size:14px;line-height:1.6;}
    .bottom-nav{position:sticky;bottom:0;width:100%;max-width:430px;background:rgba(22,31,53,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:10px 0 20px;z-index:100;flex-shrink:0;}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;transition:all 0.2s;}
    .nav-btn .nav-icon{font-size:22px;}
    .nav-btn.active{color:var(--accent);}
    .nav-btn.active .nav-icon-wrap{background:rgba(79,142,247,0.12);border-radius:12px;padding:6px 14px;}
    .nav-icon-wrap{padding:6px 14px;}
  </style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left"><div class="app-logo">🎓</div><span class="app-name">EduTrack</span></div>
  <button class="logout-icon-btn" onclick="logout()" title="Sign Out">🚪</button>
</div>
<div class="scroll-content">
  <div class="profile-card">
    <div class="profile-avatar" id="profileAvatar">S</div>
    <div class="profile-info">
      <div class="greeting">Good day,</div>
      <div class="name" id="profileName">Student</div>
      <div class="email" id="profileEmail">—</div>
      <div style="margin-top:6px;font-size:11px;font-weight:700;color:var(--accent);background:rgba(79,142,247,0.1);border:1px solid rgba(79,142,247,0.2);border-radius:100px;padding:3px 10px;display:inline-block;" id="profileStudentId">ID: —</div>
    </div>
    <div class="student-badge">Student</div>
  </div>
<!-- CHANGE PASSWORD BUTTON -->
  <button onclick="openChangePasswordModal()" style="width:100%;margin-bottom:16px;padding:12px;background:rgba(79,142,247,0.1);border:1px solid rgba(79,142,247,0.25);border-radius:12px;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">🔑 Change Password</button>

  <!-- DATE -->
  <div class="date-chip">📅 <span id="todayLabel">—</span></div>  <div class="section-title">Overview</div>
  <div class="kpi-grid">
    <div class="kpi-card total"><div class="kpi-icon">👥</div><div class="kpi-val" id="kpiTotal">0</div><div class="kpi-label">Total Students</div></div>
    <div class="kpi-card present"><div class="kpi-icon">✅</div><div class="kpi-val" id="kpiPresent">0</div><div class="kpi-label">Present</div></div>
    <div class="kpi-card absent"><div class="kpi-icon">❌</div><div class="kpi-val" id="kpiAbsent">0</div><div class="kpi-label">Absent</div></div>
    <div class="kpi-card late"><div class="kpi-icon">⏰</div><div class="kpi-val" id="kpiLate">0</div><div class="kpi-label">Late</div></div>
  </div>
  <div class="rate-card">
    <div class="rate-info">
      <div class="rate-label">My Attendance Rate</div>
      <div class="rate-val" id="rateVal">0%</div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px;" id="rateSub">No records yet</div>
    </div>
    <div class="rate-ring">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="26" fill="none" stroke="var(--border)" stroke-width="6"/>
        <circle cx="32" cy="32" r="26" fill="none" stroke="var(--accent)" stroke-width="6" stroke-dasharray="163.36" stroke-dashoffset="163.36" stroke-linecap="round" id="rateCircle"/>
      </svg>
      <div class="rate-ring-text" id="rateRingText">0%</div>
    </div>
  </div>
  <div class="section-title">Attendance History</div>
  <div class="history-card">
    <div class="history-header"><h3>📋 My Records</h3><span class="history-count" id="historyCount">0 records</span></div>
    <div id="historyList"></div>
  </div>
</div>
<div class="bottom-nav">
  <div class="nav-btn active"><div class="nav-icon-wrap"><div class="nav-icon">📊</div></div><span>Dashboard</span></div>
  <div class="nav-btn" onclick="logout()"><div class="nav-icon-wrap"><div class="nav-icon">🚪</div></div><span>Sign Out</span></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAHidY4u5a0xTktf0gswedhs9Np8Zk5600",
    authDomain: "edutrack-6dd6e.firebaseapp.com",
    projectId: "edutrack-6dd6e",
    storageBucket: "edutrack-6dd6e.firebasestorage.app",
    messagingSenderId: "567142987996",
    appId: "1:567142987996:web:518dae5a2f23fff569dc19"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const user = JSON.parse(sessionStorage.getItem('edutrack_current_user')||'null');
  if(!user){ window.location.href='index.html'; }
  else if(user.role!=='Student'){ window.location.href='lab3-attendance.html'; }

  document.getElementById('todayLabel').textContent = new Date().toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('profileAvatar').textContent = user.firstName[0].toUpperCase();
  document.getElementById('profileName').textContent = user.firstName+' '+(user.lastName||'');
  document.getElementById('profileEmail').textContent = user.email;

  let myStudentData = null;
  let allStudents = [];
  let allAttendance = {};

  async function init(){
    // Load all students
    const snap = await getDocs(collection(db,'students'));
    allStudents = [];
    snap.forEach(d => {
      const data = d.data();
      allStudents.push(data);
      if(data.email === user.email) myStudentData = data;
    });
    document.getElementById('profileStudentId').textContent = myStudentData ? 'ID: '+myStudentData.id : 'ID: Not found';
    document.getElementById('kpiTotal').textContent = allStudents.length;

    // Load all attendance
    const attSnap = await getDocs(collection(db,'attendance'));
    allAttendance = {};
    attSnap.forEach(d => allAttendance[d.id] = d.data());

    renderDashboard();

    // Real-time listener — when teacher saves attendance it updates here instantly
    const attCollection = collection(db,'attendance');
    onSnapshot(attCollection, (snap) => {
      snap.docChanges().forEach(change => {
        allAttendance[change.doc.id] = change.doc.data();
      });
      renderDashboard();
    });
  }

  function renderDashboard(){
    let totalPresent=0,totalAbsent=0,totalLate=0;
    let rows='';

    const sortedDates = Object.keys(allAttendance).sort().reverse();
    sortedDates.forEach(date => {
      const dayData = allAttendance[date];
      if(!myStudentData || !dayData[myStudentData.id]) return;
      const st = dayData[myStudentData.id];
      const time = dayData[myStudentData.id+'_time']||'—';
      if(st==='Present') totalPresent++;
      else if(st==='Absent') totalAbsent++;
      else if(st==='Late') totalLate++;
      const d = new Date(date+'T00:00:00');
      const pillClass = st==='Present'?'pill-p':st==='Absent'?'pill-a':'pill-l';
      rows += `<div class="history-row">
        <div class="history-date-box"><div class="day-num">${d.getDate()}</div><div class="month">${d.toLocaleDateString('en-PH',{month:'short'})}</div></div>
        <div class="history-info"><div class="weekday">${d.toLocaleDateString('en-PH',{weekday:'long'})}</div><div class="year">${d.getFullYear()}</div></div>
        <div class="history-right"><span class="status-pill ${pillClass}">● ${st}</span><span class="time-label">${time}</span></div>
      </div>`;
    });

    document.getElementById('kpiPresent').textContent = totalPresent;
    document.getElementById('kpiAbsent').textContent = totalAbsent;
    document.getElementById('kpiLate').textContent = totalLate;

    const totalRecords = totalPresent+totalAbsent+totalLate;
    document.getElementById('historyCount').textContent = `${totalRecords} record${totalRecords!==1?'s':''}`;

    const rate = totalRecords>0?Math.round(((totalPresent+totalLate)/totalRecords)*100):0;
    const ringColor = rate>=80?'var(--present)':rate>=60?'var(--late)':'var(--absent)';
    document.getElementById('rateVal').textContent = rate+'%';
    document.getElementById('rateVal').style.color = ringColor;
    document.getElementById('rateRingText').textContent = rate+'%';
    document.getElementById('rateRingText').style.color = ringColor;
    document.getElementById('rateSub').textContent = totalRecords>0?`Based on ${totalRecords} recorded day${totalRecords!==1?'s':''}`:'No records yet';
    document.getElementById('rateCircle').style.strokeDashoffset = 163.36-(rate/100)*163.36;
    document.getElementById('rateCircle').style.stroke = ringColor;
    document.getElementById('historyList').innerHTML = rows || `<div class="empty-state"><div class="empty-icon">📭</div><p>No attendance records yet.<br/>Your records will appear here once your teacher marks your attendance.</p></div>`;
  }

  window.logout = function(){ sessionStorage.removeItem('edutrack_current_user');window.location.href='index.html'; };

  init();
  window.openChangePasswordModal = function(){
    document.getElementById('changePwModal').style.display='flex';
    document.getElementById('changePwAlert').style.display='none';
    document.getElementById('currentPw').value='';
    document.getElementById('newPw').value='';
    document.getElementById('confirmPw').value='';
  };

  window.closeChangePasswordModal = function(){
    document.getElementById('changePwModal').style.display='none';
  };

  window.changePassword = async function(){
    const currentPw = document.getElementById('currentPw').value;
    const newPw = document.getElementById('newPw').value;
    const confirmPw = document.getElementById('confirmPw').value;
    const alertEl = document.getElementById('changePwAlert');

    function showPwAlert(type, msg){
      alertEl.style.display='block';
      alertEl.style.background = type==='error'?'rgba(239,68,68,0.12)':'rgba(16,185,129,0.12)';
      alertEl.style.border = type==='error'?'1px solid rgba(239,68,68,0.3)':'1px solid rgba(16,185,129,0.3)';
      alertEl.style.color = type==='error'?'var(--absent)':'var(--success)';
      alertEl.innerHTML = (type==='error'?'❌ ':'✅ ') + msg;
    }

    if(!currentPw||!newPw||!confirmPw){showPwAlert('error','Please fill in all fields.');return;}
    if(newPw.length<6){showPwAlert('error','New password must be at least 6 characters.');return;}
    if(newPw!==confirmPw){showPwAlert('error','New passwords do not match.');return;}

    // Verify current password against Firestore
    const userDoc = await getDoc(doc(db,'users', user.email));
    if(!userDoc.exists()||userDoc.data().password!==currentPw){
      showPwAlert('error','Current password is incorrect.');return;
    }

    // Update password in Firestore
    const { setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    await setDoc(doc(db,'users', user.email),{...userDoc.data(), password: newPw});

    // Update session
    const updatedUser = {...user, password: newPw};
    sessionStorage.setItem('edutrack_current_user', JSON.stringify(updatedUser));

    showPwAlert('success','Password updated successfully!');
    setTimeout(()=>closeChangePasswordModal(), 1500);
  };
</script>
<!-- CHANGE PASSWORD MODAL -->
<div id="changePwModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 28px;width:90%;max-width:380px;animation:popIn 0.3s cubic-bezier(0.22,1,0.36,1);">
    <div style="text-align:center;margin-bottom:20px;">
      <div style="width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px;">🔑</div>
      <h3 style="font-family:'Playfair Display',serif;font-size:20px;margin-bottom:4px;">Change Password</h3>
      <p style="color:var(--muted);font-size:13px;">Enter your current password and a new one</p>
    </div>
    <div id="changePwAlert" style="padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;"></div>
    <div style="margin-bottom:14px;">
      <label style="display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:7px;">Current Password</label>
      <div style="position:relative;">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;color:var(--muted);">🔒</span>
        <input type="password" id="currentPw" placeholder="Enter current password" style="width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px 11px 40px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;"/>
      </div>
    </div>
    <div style="margin-bottom:14px;">
      <label style="display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:7px;">New Password</label>
      <div style="position:relative;">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;color:var(--muted);">🔑</span>
        <input type="password" id="newPw" placeholder="Min. 6 characters" style="width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px 11px 40px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;"/>
      </div>
    </div>
    <div style="margin-bottom:20px;">
      <label style="display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:7px;">Confirm New Password</label>
      <div style="position:relative;">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;color:var(--muted);">🔑</span>
        <input type="password" id="confirmPw" placeholder="Repeat new password" style="width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px 11px 40px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;"/>
      </div>
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="closeChangePasswordModal()" style="flex:1;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;">Cancel</button>
      <button onclick="changePassword()" style="flex:1;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;">Update Password</button>
    </div>
  </div>
</div>
</body>
</html>
